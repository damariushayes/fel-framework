syntax = "proto3";

package fel.navigation.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/yourusername/fel-framework/spec/v1/felv1";
option java_multiple_files = true;
option java_package = "com.fel.spec.v1";

service LegacyBridgeService {
  rpc GetIsolatedState(StateRequest) returns (StateResponse);
  rpc StreamMutationEvents(MutationStreamRequest) returns (stream MutationEvent);
}

message StateRequest {
  string entity_id = 1;
  string context_boundary = 2;
}

message StateResponse {
  string entity_id = 1;
  bool is_active = 2;
  FinancialSummary financials = 3;
  google.protobuf.Timestamp synchronization_timestamp = 4;
}

message FinancialSummary {
  int64 gross_amount_cents = 1; 
  int64 net_amount_cents = 2;   
  string currency_iso = 3;     
  string legacy_gl_code = 4;    
}

message MutationStreamRequest {
  string boundary_token = 1;
  google.protobuf.Timestamp resume_from = 2;
}

message MutationEvent {
  string event_id = 1;
  string transaction_id = 2;
  string target_table = 3;
  MutationType operation = 4;
  
  google.protobuf.Timestamp commit_timestamp = 5;
  
  bytes raw_payload_snapshot = 6; 
  map<string, string> extracted_invariants = 7; 
}

enum MutationType {
  MUTATION_TYPE_UNSPECIFIED = 0;
  MUTATION_TYPE_INSERT = 1;
  MUTATION_TYPE_UPDATE = 2;
  MUTATION_TYPE_DELETE = 3;
}
